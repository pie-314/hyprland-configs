# Commands and Apps to be executed at launch (vendor defaults)

$scriptsDir = $HOME/.config/hypr/scripts
$UserScripts = $HOME/.config/hypr/UserScripts

$wallDIR=$HOME/Pictures/wallpapers
$lock = $scriptsDir/LockScreen.sh

### wallpaper stuff ###
exec-once = awww-daemon --format xrgb

# wallpaper random
#exec-once = $UserScripts/WallpaperAutoChange.sh $wallDIR # random wallpaper switcher every 30 minutes

### Startup ###
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = $scriptsDir/KeybindsLayoutInit.sh

# Drop Down terminal
exec-once = $HOME/.config/hypr/scripts/Dropterminal.sh kitty &


# Polkit (Polkit Gnome / KDE)
exec-once = $scriptsDir/Polkit.sh

# starup apps
exec-once = nm-applet --indicator
exec-once = nm-tray   # For ubuntu
exec-once = swaync
#exec-once = ags
#exec-once = rog-control-center
exec-once = waybar
exec-once = qs -c overview  # Quickshell Overview

# Clipboard manager
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Rainbow borders
#exec-once = $UserScripts/RainbowBorders.sh

# hypridle for hyprlock
exec-once = hypridle

# Resume Hyprsunset if state is "on" from previous session
exec-once = $scriptsDir/Hyprsunset.sh init

# Here are list of features available but disabled by default
# Persistent wallpaper
# exec-once = awww-daemon --format xrgb && awww img $HOME/Pictures/wallpapers/mecha-nostalgia.png 

# Gnome polkit for NixOS
#exec-once = $scriptsDir/Polkit-NixOS.sh

# xdg-desktop-portal-hyprland (should be auto starting. However, you can force to start)
#exec-once = $scriptsDir/PortalHyprland.sh

# Bluetooth manager
exec-once = blueman-applet

