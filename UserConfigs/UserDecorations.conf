# ================================
# UserDecorations.conf (NO GLOW)
# Compatible with Hyprland >= 0.40
# ================================

decoration {
    rounding = 6

    active_opacity = 1.0
    inactive_opacity = 1.0

    # Disable all shadows (glow)
    shadow {
        enabled = false
        range = 0
        render_power = 0
        color = rgba(00000000)
    }

    # Disable blur
    blur {
        enabled = false
    }
}

general {
    border_size = 2

    # Flat clean borders
    col.active_border = rgb(444444)
    col.inactive_border = rgb(222222)
}

