animations {
    enabled = yes

    # very light curves
    bezier = soft, 0.2, 0.8, 0.2, 1.0

    # slower, fewer frames = less GPU wakeups
    animation = windows, 1, 3, soft, slide
    animation = windowsIn, 1, 3, soft, slide
    animation = windowsOut, 1, 2, soft, slide
    animation = windowsMove, 1, 2, soft, slide

    # disable border animations (huge power drain)
    animation = border, 0
    animation = borderangle, 0

    # light fade only
    animation = fade, 1, 2, soft

    # calmer workspace switches
    animation = workspaces, 1, 3, soft
    animation = workspacesIn, 1, 3, soft, slide
    animation = workspacesOut, 1, 2, soft, slide
}

